# Workflow derived from https://github.com/posit-dev/r-shinylive/tree/actions-v1/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
#
# Basic example of a GitHub Actions workflow that builds a Shiny app and deploys
# it to GitHub Pages.
name: Deploy app to gh-pages

on:
  # Manually trigger the workflow
  workflow_dispatch:
  # Trigger on push to `main` branch
  push:
    branches: ["main"]
  # Trigger on pull request to all branches (but do not deploy to gh-pages)
  pull_request:

jobs:
  shinylive:
    uses: posit-dev/r-shinylive/.github/workflows/deploy-app.yaml@actions-v1
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source

    with:
      post-build: |
        echo "Injecting favicon into index.html …"

        # Path to the generated index.html (adjust if needed)
        INDEX_FILE="site/index.html"

        # Insert favicon links before </head>
        # Create a temp file for safe replacement
        TMP_FILE="${INDEX_FILE}.tmp"

        awk '
          /<\/head>/ {
            print "    <link rel=\"icon\" type=\"image/x-icon\" href=\"favicon.ico\">"
            print "    <link rel=\"icon\" type=\"image/png\" href=\"favicon.png\">"
          }
          { print }
        ' "$INDEX_FILE" > "$TMP_FILE"

        mv "$TMP_FILE" "$INDEX_FILE"

        echo "Favicon successfully injected."
