# Workflow derived from https://github.com/posit-dev/r-shinylive/tree/actions-v1/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
#
# Basic example of a GitHub Actions workflow that builds a Shiny app and deploys
# it to GitHub Pages.
name: Deploy app to gh-pages

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install shinylive
        run: |
          R -e 'install.packages("shinylive")'

      - name: Export Shinylive site
        run: |
          R -e 'shinylive::export(".", "site")'

      - name: Inject favicon links into index.html
        run: |
          INDEX_FILE="site/index.html"
          TMP_FILE="${INDEX_FILE}.tmp"

          awk '
            /<\/head>/ {
              print "    <link rel=\"icon\" type=\"image/x-icon\" href=\"favicon.ico\">"
              print "    <link rel=\"icon\" type=\"image/png\" href=\"favicon.png\">"
            }
            { print }
          ' "$INDEX_FILE" > "$TMP_FILE"

          mv "$TMP_FILE" "$INDEX_FILE"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
